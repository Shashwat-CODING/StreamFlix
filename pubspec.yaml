name: streamflix
description: "StreamFlix – All-in-one streaming app for Movies, TV, Anime, Live TV & Sports."
publish_to: 'none'

version: 1.4.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  # video_player and fvp removed in favor of media_kit
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  wakelock_plus: ^1.2.10

  dynamic_color: ^1.7.0
  shared_preferences: ^2.3.2
  loading_indicator_m3e: ^0.1.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
