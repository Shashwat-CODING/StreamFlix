name: luxa
description: "Luxa – A premium all-in-one streaming experience for Movies, TV, Anime, Live TV & Sports."
publish_to: 'none'

version: 2.5.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  wakelock_plus: ^1.2.10
  video_player: ^2.11.1
  fvp: ^0.36.2
  wallpaper_manager_plus: ^2.0.2
  flutter_cache_manager: ^3.4.1
  socket_io_client: ^3.1.0

  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  google_mobile_ads: ^8.0.0
  flutter_inappwebview: ^6.1.5
  app_links: ^7.0.0
  share_plus: ^13.1.0
  dio: ^5.9.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  media_store_plus: ^0.1.3
  flutter_markdown: ^0.7.3
  window_manager: ^0.5.1
  win32_registry: ^3.0.3
  just_audio: ^0.10.5
  audio_service: ^0.18.17
  audio_session: ^0.2.3
  flutter_staggered_grid_view: ^0.7.0
  youtube_explode_dart:
    git:
      url: https://github.com/anandnet/youtube_explode_dart.git
      ref: 1d9ec9baa806705b1d859260eeb389ec28c6b024
  flutter_client_sse: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/icon.png

  fonts:
    - family: Karst
      fonts:
        - asset: assets/karst/Karst-Light.ttf
          weight: 300
        - asset: assets/karst/Karst-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    favicon_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"
  image_path: "assets/logo.png"

